# Registry of local repos the loop may work in. Copy to repos.toml and edit.
# Triage maps each ticket to a repo via `projects` (DevOps project names)
# and `tags`; description content is the tie-breaker.

[repos.billing-service]
path = "C:/dev/billing-service"       # or ~/dev/billing-service
default_branch = "main"
test_command = "dotnet test"          # optional; run by the validator
projects = ["Billing"]
tags = ["billing", "backend", "reporting"]

[repos.crm]
path = "C:/dev/crm"
default_branch = "main"
projects = ["CRM"]
tags = ["crm"]

[repos.integrations]
path = "C:/dev/integrations"
default_branch = "develop"
projects = ["Integrations", "Platform"]
tags = ["infra", "ci", "sync"]
